id: jrdr-2026-002
title: Experimental Cut and Tooth Mark Dataset for Pandora Software Calibration
version: '1.0'
description: "This dataset contains experimental measurements of cut marks on bones\
  \ created using different tool types, and tooth marks created by different carnivores,\
  \ used to calibrate and test the Pandora software package for morphometric and statistical\
  \ analysis. It was created as part of the research published in Palomeque-Gonz\xE1\
  lez et al. (2017) in the Journal of Archaeological Science: Reports.\n"
